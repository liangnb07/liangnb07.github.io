/* --- IMAGE SLIDER STYLES --- */
.img-container {
  display: inline-block;
  position: relative;
  margin: 10px 0;
  max-width: 100%;
}

.img-container img {
  display: block;
  height: auto;
  transition: width 0.1s ease-out;
  cursor: pointer;
  border-radius: 2px;
}

.img-controls {
  display: none; 
  position: absolute; /* Keeps it relative to the image container */
  z-index: 1000;
  align-items: center;
  gap: 12px;
  background: var(--bg-color);
  border: 1px solid var(--border-color);
  padding: 5px 12px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  border-radius: 4px;
  pointer-events: auto; /* Ensures slider remains clickable */
}

.img-controls span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  min-width: 35px;
  opacity: 0.6;
}

/* Minimalist Range Input */
.img-controls input[type=range] {
  -webkit-appearance: none;
  width: 120px;
  background: transparent;
}

.img-controls input[type=range]::-webkit-slider-runnable-track {
  width: 100%;
  height: 1px;
  background: var(--border-color);
}

.img-controls input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  height: 12px;
  width: 12px;
  border-radius: 50%;
  background: var(--text-color);
  cursor: pointer;
  margin-top: -6px; /* Centers thumb on track */
  border: none;
}

    <script>
      function handleImageUpload(e) {
  const file = e.target.files[0];
  const container = document.createElement('div');
  const editor = document.getElementById('editor-content');
  if (!file) return;
  if (document.activeElement !== editor) {
    editor.focus();
  }
container.className = 'img-container';
container.style.width = '100%'; 
container.contentEditable = false;
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    const container = document.createElement('div');
    container.className = 'img-container';
    container.contentEditable = false; // Prevents typing inside the container

    const img = document.createElement('img');
    img.src = event.target.result;
    img.style.width = "100%"; // Default starting size

    // Create the Control UI
    const controls = document.createElement('div');
    controls.className = 'img-controls';
    
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = '1';
    slider.max = '200';
    slider.value = '100';

    const label = document.createElement('span');
    label.textContent = '100%';

    slider.oninput = (ev) => {
      img.style.width = slider.value + '%';
      label.textContent = slider.value + '%';
      updatePageData();
    };

    controls.appendChild(slider);
    controls.appendChild(label);
    container.appendChild(controls);
    container.appendChild(img);

    // Toggle controls on click
img.onclick = (event) => {
  event.stopPropagation();
  
  // Hide all other open controls first
  document.querySelectorAll('.img-controls').forEach(c => c.style.display = 'none');

  // Calculate position
  // event.offsetX and event.offsetY give coordinates relative to the image
  const clickX = event.offsetX;
  const clickY = event.offsetY;

  // Position the controls bar at the click location
  // We subtract a bit from Y to show it slightly above the cursor
  controls.style.left = `${clickX}px`;
  controls.style.top = `${clickY - 40}px`; 
  
  controls.style.display = 'flex';
};

    insertAtCursor(container);
    updatePageData();
  };
  reader.readAsDataURL(file);
}
function insertAtCursor(el) {
  const sel = window.getSelection();
  if (sel.getRangeAt && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(el);
    // Move cursor after the image
    range.setStartAfter(el);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

// Hide image controls when clicking elsewhere
document.addEventListener('click', (e) => {
  if (!e.target.closest('.img-container')) {
    document.querySelectorAll('.img-controls').forEach(c => c.style.display = 'none');
  }
});
      let db;
      let pages = [];
      let activePageId = null;
      let draggedId = null;
      let isLoaded = false;

      const request = indexedDB.open("MDNotesDB", 2);
      request.onupgradeneeded = e => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("pages")) db.createObjectStore("pages", { keyPath: "id" });
      };
      request.onsuccess = e => {
        db = e.target.result;
        const tx = db.transaction("pages", "readonly");
        const req = tx.objectStore("pages").getAll();
        req.onsuccess = () => {
          pages = req.result || [];
          isLoaded = true;
          if (pages.length === 0) createNewPage(null);
          else loadPage(pages[0].id);
        };
      };

      function saveToDB(page) {
        if (!page || !page.id) return;
        const tx = db.transaction("pages", "readwrite");
        tx.objectStore("pages").put(page);
      }

      function loadPage(id) {
        const page = pages.find(p => p.id === id);
        if (!page) return;
        activePageId = id;
        document.getElementById('editor-title').value = page.title || "";
        document.getElementById('editor-content').innerHTML = page.content || "";
        document.getElementById('editor-title').readOnly = (id === 'hotkeys');
        document.getElementById('editor-content').contentEditable = (id !== 'hotkeys');
        renderTree();
      }

      function createNewPage(parentId) {
        if (!isLoaded) return;
        const id = Date.now().toString();
        const newPage = { id, title: '', content: '', parent: parentId, collapsed: false, order: Date.now() };
        pages.push(newPage);
        saveToDB(newPage);
        loadPage(id);
      }

      function updatePageData() {
        if (!isLoaded || activePageId === 'hotkeys' || !activePageId) return;
        const page = pages.find(p => p.id === activePageId);
        if (page) {
          page.title = document.getElementById('editor-title').value;
          page.content = document.getElementById('editor-content').innerHTML;
          saveToDB(page);
          renderTree();
        }
      }

      function deleteCurrentPage() {
        if (!activePageId || activePageId === 'hotkeys') return;
        const idsToDelete = [];
        const findChildren = (id) => {
          idsToDelete.push(id);
          pages.filter(p => p.parent === id).forEach(child => findChildren(child.id));
        };
        findChildren(activePageId);
        const tx = db.transaction("pages", "readwrite");
        const store = tx.objectStore("pages");
        idsToDelete.forEach(id => store.delete(id));
        tx.oncomplete = () => {
          pages = pages.filter(p => !idsToDelete.includes(p.id));
          if (pages.length > 0) loadPage(pages[0].id);
          else createNewPage(null);
        };
      }

      function renderTree() {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';
        const build = (parentId, depth, isHidden) => {
          if (isHidden) return;
          pages.filter(p => p.parent === parentId && p.id !== 'hotkeys')
            .sort((a, b) => a.order - b.order)
            .forEach((p, index, arr) => {
              const row = document.createElement('div');
              row.className = 'sidebar-row';
              row.draggable = true;
              row.ondragstart = () => draggedId = p.id;
              row.ondrop = (e) => {
                e.preventDefault();
                if (draggedId && draggedId !== p.id) {
                  const dP = pages.find(x => x.id === draggedId);
                  if (dP) { dP.parent = p.id; saveToDB(dP); renderTree(); }
                }
              };
              row.ondragover = (e) => e.preventDefault();
              for (let i = 0; i < depth; i++) {
                const n = document.createElement('div');
                n.className = 'line-node';
                const v = document.createElement('div');
                v.className = 'line-v';
                if (i === depth - 1 && index === arr.length - 1) v.classList.add('last-branch');
                if (i === depth - 1) n.appendChild(Object.assign(document.createElement('div'), { className: 'line-h' }));
                n.appendChild(v);
                row.appendChild(n);
              }
              const hasC = pages.some(c => c.parent === p.id);
              const t = document.createElement('div');
              if (hasC) {
                t.className = `collapse-toggle ${p.collapsed?'collapsed':''}`;
                t.innerHTML = '▲';
                t.onclick = (e) => { e.stopPropagation(); p.collapsed = !p.collapsed; saveToDB(p); renderTree(); };
              } else t.className = 'leaf-dot';
              row.appendChild(t);
              const l = document.createElement('span');
              l.className = `page-link ${p.id===activePageId?'active':''}`;
              l.textContent = p.title || 'untitled';
              l.onclick = () => loadPage(p.id);
              row.appendChild(l);
              container.appendChild(row);
              build(p.id, depth + 1, p.collapsed || isHidden);
            });
        };
        build(null, 0, false);
      }

      function toggleVisualTree(close = false) {
        const ov = document.getElementById('tree-overlay');
        if (close) { ov.style.display = 'none'; return; }
        ov.style.display = (ov.style.display !== 'block') ? 'block' : 'none';
        if (ov.style.display === 'block') {
          document.getElementById('search-input').value = '';
          renderVisualTree();
          document.getElementById('search-input').focus();
        }
      }

      function performSearch() {
        const term = document.getElementById('search-input').value.toLowerCase();
        if (!term) { renderVisualTree(); return; }
        const visibleIds = new Set();
        const matchedIds = new Set();
        pages.forEach(p => {
          const cleanContent = (p.content || "").replace(/<[^>]*>/g, '').toLowerCase();
          if ((p.title || "").toLowerCase().includes(term) || cleanContent.includes(term)) {
            matchedIds.add(p.id);
            let curr = p;
            while (curr) { visibleIds.add(curr.id); curr = pages.find(parent => parent.id === curr.parent); }
          }
        });
        renderVisualTree(visibleIds, matchedIds);
      }

      function renderVisualTree(filterSet = null, matches = new Set()) {
        const container = document.getElementById('visual-tree-content');
        container.innerHTML = '';
        const buildMap = (pid, target) => {
          pages.filter(p => p.parent === pid && p.id !== 'hotkeys').forEach(p => {
            if (filterSet && !filterSet.has(p.id)) return;
            const branch = document.createElement('div');
            branch.className = 'tree-branch';
            const link = document.createElement('span');
            link.className = `visual-tree-link ${matches.has(p.id) ? 'search-match' : ''}`;
            link.textContent = p.title || 'untitled';
            link.onclick = () => { loadPage(p.id); toggleVisualTree(true); };
            const wrapper = document.createElement('div');
            wrapper.className = 'tree-node-wrapper';
            wrapper.appendChild(link);
            branch.appendChild(wrapper);
            buildMap(p.id, branch);
            target.appendChild(branch);
          });
        };
        buildMap(null, container);
      }

function getFullBranchData(rootId, depth = 0, type = 'text') {
        let title, content;
        const page = pages.find(p => p.id === rootId);
        
        if (rootId === 'hotkeys') {
          title = "hotkeys";
          content = document.getElementById('editor-content').innerHTML;
        } else {
          if (!page) return "";
          title = page.title || 'untitled';
          content = page.content || '';
        }

        let output = "";
        if (type === 'text') {
          const indent = "  ".repeat(depth);
          const clean = content.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').trim();
          output += `${indent}${depth > 0 ? '- ' : ''}${title}\n${indent}${clean}\n\n`;
        } else {
          output += `
            <div style="margin-bottom: 30px; color:#000; font-family: 'JetBrains Mono', monospace;">
              <h2 style="border-bottom: 1px solid #eee; font-weight:400; text-transform:lowercase; font-size: 18pt; margin-bottom: 10px;">${title}</h2>
              <div style="font-size: 12pt; line-height: 1.5; font-weight: 300;">${content}</div>
            </div>`;
        }

        // Logic Change: 
        // 1. If we are at the top level of the export (depth === 0)
        // 2. And this page has a parent (it's a branch)
        // 3. Then STOP here. Do not look for children.
        if (depth === 0 && page && page.parent !== null) {
          return output;
        }

        // Otherwise, if it's a root or we are already inside a root's recursion, get children
        if (rootId !== 'hotkeys') {
          pages
            .filter(p => p.parent === rootId)
            .sort((a, b) => a.order - b.order)
            .forEach(child => {
              output += getFullBranchData(child.id, depth + 1, type);
            });
        }
        return output;
      }

      function exportPDF() {
        if (!activePageId) return;
        const now = new Date();
        const ts = `${now.getFullYear()}_${String(now.getMonth() + 1).padStart(2, '0')}_${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}-${String(now.getMinutes()).padStart(2, '0')}-${String(now.getSeconds()).padStart(2, '0')}`;
        const page = pages.find(p => p.id === activePageId);
        const name = activePageId === 'hotkeys' ? 'hotkeys' : (page?.title || 'untitled');
        const fileName = `export_${name.replace(/\s+/g, '_').toLowerCase()}_{${ts}}.pdf`;
        const container = document.createElement('div');
        container.style.padding = "40px";
        container.style.background = "#fff";
        
        container.innerHTML = getFullBranchData(activePageId, 0, 'html');

        html2pdf().set({
          margin: [0.5, 0.5, 0.5, 0.5],
          filename: fileName,
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        }).from(container).save();
      }

      function exportTXT() {
        if (!activePageId) return;
        const now = new Date();
        const ts = `${now.getFullYear()}_${String(now.getMonth() + 1).padStart(2, '0')}_${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}-${String(now.getMinutes()).padStart(2, '0')}-${String(now.getSeconds()).padStart(2, '0')}`;
        const page = pages.find(p => p.id === activePageId);
        const name = activePageId === 'hotkeys' ? 'hotkeys' : (page?.title || 'untitled');
        const fileName = `export_${name.replace(/\s+/g, '_').toLowerCase()}_{${ts}}.pdf`;
        const blob = new Blob([getFullBranchData(activePageId, 0, 'text')], { type: "text/plain" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `notes.txt`;
        a.click();
      }

      function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
      function toggleTheme() { document.body.classList.toggle('light-mode'); }
      function execCmd(cmd, value = null) {
        if (activePageId !== 'hotkeys') {
          document.execCommand(cmd, false, value);
          document.getElementById('editor-content').focus();
          updatePageData();
        }
      }

      function handleGlobalKeys(e) {
        const isCtrl = e.ctrlKey || e.metaKey;
        const key = e.key.toLowerCase();
        if (isCtrl && key === 'r') { e.preventDefault(); createNewPage(null); }
        if (isCtrl && key === 'b') { e.preventDefault(); createNewPage(activePageId); }
        if (isCtrl && key === 'l') { e.preventDefault(); toggleSidebar(); }
        if (isCtrl && key === 'm') { e.preventDefault(); toggleTheme(); }
        if (isCtrl && key === 'd') { e.preventDefault(); deleteCurrentPage(); }
        if (isCtrl && key === 'h') { e.preventDefault(); showHotkeys(); }
        if (e.key === 'Escape') toggleVisualTree(true);
      }

      function showHotkeys() {
        activePageId = 'hotkeys';
        const t = document.getElementById('editor-title');
        const c = document.getElementById('editor-content');
        t.value = "hotkeys";
        t.readOnly = true;
        c.innerHTML = `<div style="font-family:'JetBrains Mono'; font-size: 0.9rem; line-height: 2; opacity: 0.8;">
                <p>ctrl + r : new root page</p>
                <p>ctrl + b : new branch page</p>
                <p>ctrl + l : toggle sidebar</p>
                <p>ctrl + m : dark/light mode</p>
                <p>ctrl + d : delete page hierarchy</p>
                <p>ctrl + h : hotkeys page</p>
                <p>esc      : exit treemap</p>
            </div>`;
        c.contentEditable = false;
        renderTree();
      }

      function exportJSON() {
        const blob = new Blob([JSON.stringify(pages)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup.json`;
        a.click();
      }

      function importJSON() {
        const i = document.createElement('input');
        i.type = 'file';
        i.onchange = e => {
          const r = new FileReader();
          r.onload = ev => {
            const imp = JSON.parse(ev.target.result);
            const tx = db.transaction("pages", "readwrite");
            imp.forEach(p => tx.objectStore("pages").put(p));
            tx.oncomplete = () => location.reload();
          };
          r.readAsText(e.target.files[0]);
        };
        i.click();
      }
    </script>
  </body>

</html>
